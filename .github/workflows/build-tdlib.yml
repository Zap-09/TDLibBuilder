name: Build TDLib Android (Official)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: 27.0.12077973

    steps:
    # -----------------------------
    # 1. Checkout TDLib
    # -----------------------------
    - name: Clone TDLib
      run: |
        git clone https://github.com/tdlib/td.git
        cd td
        git checkout master

    # -----------------------------
    # 2. Install dependencies
    # -----------------------------
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y \
          git curl wget unzip zip \
          build-essential \
          cmake \
          ninja-build \
          gperf \
          php \
          perl \
          openjdk-17-jdk

    # -----------------------------
    # 3. Setup Android SDK (manual fix)
    # -----------------------------
    - name: Setup Android SDK folder
      run: |
        mkdir -p $HOME/android-sdk
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV

    # -----------------------------
    # 4. Install Android CLI tools
    # -----------------------------
    - name: Download command line tools
      run: |
        cd $HOME/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-*.zip -d cmdline-tools
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/cmdline-tools/* cmdline-tools/latest/

        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

    # -----------------------------
    # 5. Accept licenses + install SDK
    # -----------------------------
    - name: Install SDK packages
      run: |
        yes | sdkmanager --sdk_root=$HOME/android-sdk \
          "platform-tools" \
          "platforms;android-34" \
          "ndk;$ANDROID_NDK_VERSION" \
          "cmake;3.22.1"

    # -----------------------------
    # 6. Fix TDLib Android scripts
    # -----------------------------
    - name: Prepare TDLib Android build
      working-directory: td/example/android
      run: |
        chmod +x *.sh

    # -----------------------------
    # 7. STEP 1: environment check (optional)
    # -----------------------------
    - name: Check environment
      working-directory: td/example/android
      run: |
        ./check-environment.sh || true

    # -----------------------------
    # 8. STEP 2: fetch SDK (FIX FOR YOUR ERROR)
    # -----------------------------
    - name: Clean SDK directory
      run: |
        rm -rf $HOME/android-sdk

    - name: Fetch SDK
      working-directory: td/example/android
      run: |
        ./fetch-sdk.sh "$ANDROID_HOME" "$ANDROID_NDK_VERSION"

    # -----------------------------
    # 9. STEP 3: OpenSSL
    # -----------------------------
    - name: Build OpenSSL
      working-directory: td/example/android
      run: |
        ./build-openssl.sh "$ANDROID_HOME" "$ANDROID_NDK_VERSION"

    # -----------------------------
    # 10. STEP 4: TDLib build
    # -----------------------------
    - name: Build TDLib
      working-directory: td/example/android
      run: |
        ./build-tdlib.sh "$ANDROID_HOME" "$ANDROID_NDK_VERSION"

    # -----------------------------
    # 11. Collect outputs
    # -----------------------------
    - name: Collect artifacts
      run: |
        mkdir -p release

        cp -r td/tdlib/java release/ || true
        cp -r td/tdlib/libs release/ || true

        cd release
        zip -r ../tdlib-android.zip .

    # -----------------------------
    # 12. Upload artifact
    # -----------------------------
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: tdlib-android
        path: tdlib-android.zip