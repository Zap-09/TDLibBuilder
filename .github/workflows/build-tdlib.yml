name: Build TDLib Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: 27.0.12077973
      TDLIB_TAG: v1.8.49

    steps:

    # -----------------------------
    # 1. Clone TDLib
    # -----------------------------
    - name: Clone TDLib (stable commit)
      run: |
        git clone https://github.com/tdlib/td.git
        cd td
        git checkout master

    # -----------------------------
    # 2. Java setup
    # -----------------------------
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # -----------------------------
    # 3. Android SDK
    # -----------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;${ANDROID_NDK_VERSION}"

    - name: Export Android env
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV

    # -----------------------------
    # 4. System dependencies
    # -----------------------------
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          ninja-build \
          gperf \
          php \
          git \
          zip \
          unzip \
          zlib1g-dev \
          openjdk-17-jdk

    # -----------------------------
    # 5. IMPORTANT STEP (FIX YOU WERE MISSING)
    # -----------------------------
    - name: Fetch TDLib Android SDK
      working-directory: td/example/android
      run: |
        chmod +x fetch-sdk.sh
        ./fetch-sdk.sh

    # -----------------------------
    # 6. Build OpenSSL
    # -----------------------------
    - name: Build OpenSSL
      working-directory: td/example/android
      run: |
        chmod +x build-openssl.sh
        ./build-openssl.sh

    # -----------------------------
    # 7. Build TDLib JNI
    # -----------------------------
    - name: Build TDLib
      working-directory: td/example/android
      run: |
        chmod +x build-tdlib.sh
        TDLIB_INTERFACE=Java ./build-tdlib.sh

    # -----------------------------
    # 8. Collect outputs
    # -----------------------------
    - name: Collect artifacts
      run: |
        mkdir -p release/java
        mkdir -p release/jniLibs/arm64-v8a
        mkdir -p release/jniLibs/armeabi-v7a
        mkdir -p release/jniLibs/x86
        mkdir -p release/jniLibs/x86_64

        # Java bindings
        find td -name TdApi.java -exec cp {} release/java/ \;
        find td -name Client.java -exec cp {} release/java/ \;

        # Native libs
        find td -name libtdjni.so | while read file; do
          abi=$(basename "$(dirname "$file")")
          cp "$file" "release/jniLibs/$abi/" 2>/dev/null || true
        done

    # -----------------------------
    # 9. Debug check
    # -----------------------------
    - name: Verify output
      run: |
        echo "JAVA:"
        find release/java

        echo "JNI:"
        find release/jniLibs

    # -----------------------------
    # 10. Zip release
    # -----------------------------
    - name: Create zip
      run: |
        cd release
        zip -r ../tdlib-android.zip .

    # -----------------------------
    # 11. Upload artifact
    # -----------------------------
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tdlib-android
        path: tdlib-android.zip